# -----------------------------------------------------
# 1. 패키지 업데이트
# -----------------------------------------------------
- name: "APT update"
  apt:
    update_cache: yes
    cache_valid_time: 3600

# -----------------------------------------------------
# 2. Docker 설치에 필요한 패키지 설치 (keyrings 방식)
# -----------------------------------------------------
- name: "Install required packages for Docker"
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present

# -----------------------------------------------------
# 3. keyrings 디렉토리 생성
# -----------------------------------------------------
- name: "Create /etc/apt/keyrings directory"
  file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

# -----------------------------------------------------
# 4. Docker GPG 키 추가 (keyrings)
# -----------------------------------------------------
- name: "Add Docker GPG key"
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
    | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

# -----------------------------------------------------
# 5. Docker 공식 APT 저장소 추가
# -----------------------------------------------------
- name: "Add Docker APT repository"
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    owner: root
    group: root
    mode: '0644'
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable

# -----------------------------------------------------
# 6. Docker 저장소 반영
# -----------------------------------------------------
- name: "APT update after Docker repo added"
  apt:
    update_cache: yes

# -----------------------------------------------------
# 7. Docker Engine 설치
# -----------------------------------------------------
- name: "Install Docker Engine"
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

# -----------------------------------------------------
# 8. Docker data-root 디렉토리 생성
# -----------------------------------------------------
- name: "Create Docker data-root directory"
  file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: '0711'

# -----------------------------------------------------
# 9-1. Docker daemon.json 설정
# -----------------------------------------------------
- name: "Create /etc/docker directory exists"
  file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'

# -----------------------------------------------------
# 9-2. Docker daemon.json 설정
# -----------------------------------------------------
- name: "Configure Docker daemon.json"
  copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
    content: |
      {
        "data-root": "{{ docker_data_root }}"
      }
  notify: Restart Docker

# -----------------------------------------------------
# 10. Docker 서비스 활성화 및 실행
# -----------------------------------------------------
- name: "Enable and start Docker service"
  systemd:
    name: docker
    enabled: yes
    state: started

# -----------------------------------------------------
# 11. containerd 디렉토리 생성
# -----------------------------------------------------
- name: "Create containerd directories"
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ containerd_root }}/root"
    - "{{ containerd_root }}/state"

# -----------------------------------------------------
# 12. containerd config.toml 설정
# -----------------------------------------------------
- name: "Ensure containerd root and state are set in config.toml"
  blockinfile:
    path: /etc/containerd/config.toml
    marker: "# {mark} ANSIBLE CONTAINERD PATHS"
    block: |
      [plugins."io.containerd.grpc.v1.cri".containerd]
      root = "{{ containerd_root }}/root"
      state = "{{ containerd_root }}/state"
  notify: Restart containerd

# -----------------------------------------------------
# 13. containerd 서비스 활성화 및 실행
# -----------------------------------------------------
- name: "Ensure containerd service is running"
  systemd:
    name: containerd
    enabled: yes
    state: restarted

# -----------------------------------------------------
# 14. 서비스 검증
# -----------------------------------------------------
- name: "Check Docker service status"
  command: systemctl is-active docker
  register: docker_status
  changed_when: false

- name: "Check containerd service status"
  command: systemctl is-active containerd
  register: containerd_status
  changed_when: false

- name: "Assert both services are running"
  assert:
    that:
      - docker_status.stdout == "active"
      - containerd_status.stdout == "active"
    success_msg: "Good!.. | Docker & containerd services are running"
    fail_msg: "ERROR!.. | Docker or containerd service is NOT running"
