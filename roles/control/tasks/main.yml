# -----------------------------------------------------
# Control Node 기본 설정
# -----------------------------------------------------

# 1. sshpass 설치 여부 확인(체크만)
# sshpass → ssh 접속을 자동화할 때 비밀번호를 명령어로 넘길 수 있게 해주는 도구
- name: "Check if sshpass is installed"
  command: dpkg -l | grep sshpass
  register: sshpass_installed
  changed_when: false
  failed_when: false

# 2. sshpass 설치 (없을 떄만)
- name: "Install sshpass on Control node"
  apt:
    name: sshpass # 설치할 패키지 명
    state: present # 없으면 설치 / 있으면 그대로
    update_cache: yes # apt update 먼저 수행
  when: sshpass_installed.rc != 0

# 3. sshpass 실행 검증
- name: "Verify sshpass version"
  command: sshpass -V
  register: sshpass_check
  changed_when: false

# 4. sshpass 설치 검증(assert)
# ansible assert → 조건 맞는지 검사, 아니면 실행을 즉시 실패시키는 검증용 도구
- name: "Verify sshpass installation"
  assert:
    that:
      - sshpass_check.rc == 0
    fail_msg: "[FAIL] sshpass install failed"
    success_msg: >
      [SUCCESS] sshpass install verified successfully
      {{ sshpass_check.stdout | default('no output') }}
